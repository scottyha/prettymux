name: prettymux
base: core24
version: '0.2.34'
license: GPL-3.0-only
summary: GPU-accelerated terminal multiplexer
description: |
  PrettyMux is a GPU-accelerated terminal multiplexer built on
  libghostty with an embedded browser, workspace management,
  and shell integration.
confinement: classic
grade: devel
platforms:
  amd64:

apps:
  prettymux:
    command: usr/bin/prettymux
    desktop: usr/share/applications/prettymux.desktop
    environment:
      LD_LIBRARY_PATH: $SNAP/usr/lib/prettymux:$LD_LIBRARY_PATH
      GTK_PATH: $SNAP/usr/lib/x86_64-linux-gnu/gtk-4.0

parts:
  ghostty:
    plugin: nil
    source: ./ghostty
    build-packages:
      - curl
      - xz-utils
    override-build: |
      cd $CRAFT_PART_SRC
      export ZIG_VERSION=0.15.2
      export ZIG_DIR="$CRAFT_PART_BUILD/zig"
      mkdir -p "$ZIG_DIR"
      curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" \
        | tar -xJ -C "$ZIG_DIR" --strip-components=1
      "$ZIG_DIR/zig" build \
        -Dapp-runtime=none \
        -Doptimize=ReleaseFast \
        -Dtarget=x86_64-linux-gnu
      mkdir -p $CRAFT_PART_INSTALL/ghostty
      cp -a include $CRAFT_PART_INSTALL/ghostty/
      cp -a vendor $CRAFT_PART_INSTALL/ghostty/
      mkdir -p $CRAFT_PART_INSTALL/ghostty/zig-out
      cp -a zig-out/lib $CRAFT_PART_INSTALL/ghostty/zig-out/
      mkdir -p $CRAFT_PART_INSTALL/usr/lib/prettymux
      cp $CRAFT_PART_INSTALL/ghostty/zig-out/lib/libghostty.so $CRAFT_PART_INSTALL/usr/lib/prettymux/

  prettymux:
    after: [ghostty]
    plugin: nil
    source: .
    build-packages:
      - libgtk-4-dev
      - libadwaita-1-dev
      - libwebkitgtk-6.0-dev
      - libjson-glib-dev
      - meson
      - ninja-build
      - g++
    stage-packages:
      - libgtk-4-1
      - libadwaita-1-0
      - libwebkitgtk-6.0-4
      - libjson-glib-1.0-0
    override-build: |
      cd $CRAFT_PART_SRC/src/gtk
      meson setup builddir --buildtype=release -Dghostty_dir=$CRAFT_STAGE/ghostty
      ninja -C builddir
      mkdir -p $CRAFT_PART_INSTALL/usr/bin
      cp builddir/prettymux $CRAFT_PART_INSTALL/usr/bin/
      cp builddir/prettymux-open $CRAFT_PART_INSTALL/usr/bin/ || true
      mkdir -p $CRAFT_PART_INSTALL/usr/share/prettymux
      cp $CRAFT_PART_SRC/src/gtk/prettymux-shell-integration.sh $CRAFT_PART_INSTALL/usr/bin/
      cp $CRAFT_PART_SRC/src/gtk/prettymux-shell-integration.sh $CRAFT_PART_INSTALL/usr/share/prettymux/shell-integration.sh
      cp $CRAFT_PART_SRC/src/gtk/prettymux-bashrc.sh $CRAFT_PART_INSTALL/usr/share/prettymux/prettymux-bashrc.sh
      cp $CRAFT_STAGE/ghostty/src/shell-integration/bash/ghostty.bash $CRAFT_PART_INSTALL/usr/share/prettymux/ghostty.bash
      cp $CRAFT_STAGE/ghostty/src/shell-integration/bash/bash-preexec.sh $CRAFT_PART_INSTALL/usr/share/prettymux/bash-preexec.sh
      mkdir -p $CRAFT_PART_INSTALL/usr/share/prettymux/shell-integration
      cp -a $CRAFT_STAGE/ghostty/src/shell-integration/. $CRAFT_PART_INSTALL/usr/share/prettymux/shell-integration/
      bash $CRAFT_PART_SRC/packaging/verify-shell-integration.sh $CRAFT_PART_INSTALL/usr/share/prettymux
      mkdir -p $CRAFT_PART_INSTALL/usr/share/prettymux/bin
      cp $CRAFT_PART_SRC/src/gtk/bin/open $CRAFT_PART_INSTALL/usr/share/prettymux/bin/
      cp $CRAFT_PART_SRC/src/gtk/bin/xdg-open $CRAFT_PART_INSTALL/usr/share/prettymux/bin/
      mkdir -p $CRAFT_PART_INSTALL/usr/share/applications
      cp $CRAFT_PART_SRC/packaging/prettymux.desktop $CRAFT_PART_INSTALL/usr/share/applications/
      mkdir -p $CRAFT_PART_INSTALL/usr/share/icons/hicolor/scalable/apps
      cp $CRAFT_PART_SRC/packaging/prettymux.svg $CRAFT_PART_INSTALL/usr/share/icons/hicolor/scalable/apps/
