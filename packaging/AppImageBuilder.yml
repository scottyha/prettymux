version: 1

AppDir:
  path: ./AppDir

  app_info:
    id: dev.prettymux.app
    name: PrettyMux
    icon: prettymux
    version: 0.2.30
    exec: usr/bin/prettymux

  runtime:
    env:
      LD_LIBRARY_PATH: $APPDIR/usr/lib/prettymux:$LD_LIBRARY_PATH

AppImage:
  update-information: gh-releases-zsync|patcito|prettymux|latest|PrettyMux-*x86_64.AppImage.zsync
  sign-key: None
  arch: x86_64
