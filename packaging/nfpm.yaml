name: prettymux
arch: amd64
platform: linux
version: 0.2.30
maintainer: patcito
description: GPU-accelerated terminal multiplexer
homepage: https://github.com/patcito/prettymux
license: GPL-3.0-only

overrides:
  deb:
    depends:
      - libgtk-4-1
      - libadwaita-1-0
      - libwebkitgtk-6.0-4
      - libjson-glib-1.0-0
  rpm:
    depends:
      - gtk4
      - libadwaita
      - webkitgtk6.0
      - json-glib

contents:
  - src: dist/usr/bin/prettymux
    dst: /usr/bin/prettymux
    file_info:
      mode: 0755

  - src: dist/usr/bin/prettymux-open
    dst: /usr/bin/prettymux-open
    file_info:
      mode: 0755

  - src: dist/usr/lib/prettymux/libghostty.so
    dst: /usr/lib/prettymux/libghostty.so
    file_info:
      mode: 0644

  - src: dist/usr/share/prettymux/shell-integration.sh
    dst: /usr/share/prettymux/shell-integration.sh
    file_info:
      mode: 0644
  - src: dist/usr/share/prettymux/prettymux-bashrc.sh
    dst: /usr/share/prettymux/prettymux-bashrc.sh
    file_info:
      mode: 0644
  - src: dist/usr/share/prettymux/ghostty.bash
    dst: /usr/share/prettymux/ghostty.bash
    file_info:
      mode: 0644
  - src: dist/usr/share/prettymux/bash-preexec.sh
    dst: /usr/share/prettymux/bash-preexec.sh
    file_info:
      mode: 0644
  - src: dist/usr/share/prettymux/shell-integration
    dst: /usr/share/prettymux/shell-integration
    type: tree
  - src: dist/usr/share/prettymux/bin/open
    dst: /usr/share/prettymux/bin/open
    file_info:
      mode: 0755
  - src: dist/usr/share/prettymux/bin/xdg-open
    dst: /usr/share/prettymux/bin/xdg-open
    file_info:
      mode: 0755

  - src: packaging/prettymux.desktop
    dst: /usr/share/applications/prettymux.desktop
    file_info:
      mode: 0644
  - src: packaging/prettymux.svg
    dst: /usr/share/icons/hicolor/scalable/apps/prettymux.svg
    file_info:
      mode: 0644
  - src: LICENSE
    dst: /usr/share/licenses/prettymux/LICENSE
    file_info:
      mode: 0644
