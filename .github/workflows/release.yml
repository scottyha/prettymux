  # ---------------------------------------------------------------------------
  # Release (runs on version tags only)
  # ---------------------------------------------------------------------------
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-linux-ubuntu-lts
      - build-linux-fedora
      - build-linux-deb
      - build-flatpak
      - build-archlinux
      - build-appimage
      # - build-windows      # DISABLED: GTK4+WebKitGTK is Linux-only
      # - build-macos        # DISABLED: GTK4+WebKitGTK is Linux-only
      # - build-macos-intel  # DISABLED: GTK4+WebKitGTK is Linux-only
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (for git log)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p' || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" -20)
          fi
          echo "$CHANGELOG" > changelog.txt
          echo "Generated changelog with $(echo "$CHANGELOG" | wc -l) entries"

      - name: Gather release assets
        run: |
          mkdir -p release-assets

          # Ubuntu tarballs
          cp artifacts/prettymux-ubuntu-24.04-amd64/*.tar.gz release-assets/ || true

          # Fedora RPM
          cp artifacts/prettymux-fedora-rpm/*.rpm release-assets/ || true
          cp artifacts/prettymux-fedora-rpm/*.rpm release-assets/prettymux.x86_64.rpm || true

          # Debian .deb
          cp artifacts/prettymux-deb/*.deb release-assets/ || true
          cp artifacts/prettymux-deb/*.deb release-assets/prettymux_amd64.deb || true

          # Snap
          cp artifacts/prettymux-snap/*.snap release-assets/ || true

          # Flatpak
          cp artifacts/prettymux-flatpak/*.flatpak release-assets/ || true

          # Arch Linux
          cp artifacts/prettymux-archlinux/*.pkg.tar.zst release-assets/ || true
          if [ -d artifacts/prettymux-pkgbuild ]; then
            tar czf release-assets/prettymux-archlinux-PKGBUILD.tar.gz -C artifacts/prettymux-pkgbuild .
          fi

          # AppImage
          cp artifacts/prettymux-appimage/*.AppImage release-assets/ || true

          # Windows
          cp artifacts/prettymux-windows-x64/*.zip release-assets/ || true

          # macOS
          cp artifacts/prettymux-macos-arm64/*.dmg release-assets/ || true
          cp artifacts/prettymux-macos-x64/*.dmg release-assets/ || true

          echo "Release assets:"
          ls -lh release-assets/

      - name: Detect pre-release
        id: prerelease
        run: |
          TAG="${GITHUB_REF_NAME}"
          if echo "$TAG" | grep -qiE '(alpha|beta|rc)'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PrettyMux ${{ github.ref_name }}
          body_path: changelog.txt
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          files: release-assets/*
          fail_on_unmatched_files: false

  publish-aur-bin:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/patcito/prettymux-build-archlinux:latest
    env:
      AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
    steps:
      - name: Checkout prettymux
        uses: actions/checkout@v5

      - name: Publish prettymux-bin to AUR
        if: env.AUR_SSH_PRIVATE_KEY != ''
        run: |
          pacman -Sy --noconfirm --needed openssh shadow
          VERSION="${GITHUB_REF_NAME#v}"
          ASSET="prettymux-${VERSION}-1-x86_64.pkg.tar.zst"
          ASSET_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${ASSET}"
          curl -fsSL "$ASSET_URL" -o "/tmp/${ASSET}"
          SHA256="$(sha256sum "/tmp/${ASSET}" | awk '{print $1}')"

          id -u aurbuilder >/dev/null 2>&1 || useradd -m -U aurbuilder
          install -d -m 700 -o aurbuilder -g aurbuilder /home/aurbuilder/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > /home/aurbuilder/.ssh/aur
          chmod 600 /home/aurbuilder/.ssh/aur
          ssh-keyscan -H -t rsa,ecdsa,ed25519 aur.archlinux.org > /home/aurbuilder/.ssh/known_hosts
          chmod 600 /home/aurbuilder/.ssh/known_hosts
          cat > /home/aurbuilder/.ssh/config <<'EOF'
          Host aur.archlinux.org
            HostName aur.archlinux.org
            User aur
            IdentityFile /home/aurbuilder/.ssh/aur
            IdentitiesOnly yes
            StrictHostKeyChecking yes
            UserKnownHostsFile /home/aurbuilder/.ssh/known_hosts
          EOF
          chmod 600 /home/aurbuilder/.ssh/config
          chown -R aurbuilder:aurbuilder /home/aurbuilder/.ssh

          su - aurbuilder -c 'git config --global user.name "prettymux-bot"'
          su - aurbuilder -c 'git config --global user.email "prettymux-bot@users.noreply.github.com"'

          rm -rf /tmp/aur-prettymux-bin
          if su - aurbuilder -c 'git ls-remote ssh://aur@aur.archlinux.org/prettymux-bin.git >/dev/null 2>&1'; then
            su - aurbuilder -c 'git clone ssh://aur@aur.archlinux.org/prettymux-bin.git /tmp/aur-prettymux-bin'
          else
            install -d -m 755 -o aurbuilder -g aurbuilder /tmp/aur-prettymux-bin
            su - aurbuilder -c 'git init -b master /tmp/aur-prettymux-bin'
            su - aurbuilder -c 'cd /tmp/aur-prettymux-bin && git remote add origin ssh://aur@aur.archlinux.org/prettymux-bin.git'
          fi

          sed \
            -e "s/@@VERSION@@/${VERSION}/g" \
            -e "s/@@SHA256@@/${SHA256}/g" \
            packaging/PKGBUILD-bin.in > /tmp/aur-prettymux-bin/PKGBUILD

          chown -R aurbuilder:aurbuilder /tmp/aur-prettymux-bin
          su - aurbuilder -c '
            cd /tmp/aur-prettymux-bin &&
            makepkg --printsrcinfo > .SRCINFO &&
            git add PKGBUILD .SRCINFO &&
            if git diff --cached --quiet; then
              echo "No prettymux-bin changes to publish"
              exit 0
            fi &&
            git commit -m "Update prettymux-bin to '"${VERSION}"'" &&
            git push origin master
          '
