name: CI + Packaging + Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      jobs:
        description: 'Jobs to run (comma-separated: ubuntu,fedora,deb,arch,snap,flatpak,appimage — or "all")'
        required: true
        type: string

env:
  GHOSTTY_REPO: patcito/ghostty
  GHOSTTY_BRANCH: linux-embedded-platform
  GHOSTTY_RELEASE: linux-embedded-v0.1.0
  ZIG_VERSION: '0.15.2'

jobs:
  # ---------------------------------------------------------------------------
  # Build generic libghostty once (shared by all Linux jobs)
  # ---------------------------------------------------------------------------
  fetch-libghostty:
    if: github.event_name == 'push' || inputs.jobs == 'all' || contains(inputs.jobs, 'ubuntu') || contains(inputs.jobs, 'fedora') || contains(inputs.jobs, 'deb') || contains(inputs.jobs, 'arch') || contains(inputs.jobs, 'flatpak') || contains(inputs.jobs, 'appimage') || contains(inputs.jobs, 'linux')
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/patcito/prettymux-build-debian:bookworm
    steps:
      - name: Checkout ghostty fork
        uses: actions/checkout@v5
        with:
          repository: ${{ env.GHOSTTY_REPO }}
          ref: ${{ env.GHOSTTY_BRANCH }}
          path: ghostty

      - name: Resolve ghostty revision
        id: ghostty_rev
        run: |
          echo "sha=$(git -C ghostty rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Restore Ghostty Zig cache
        uses: actions/cache@v4
        with:
          path: |
            ghostty/.zig-cache
            .zig-global-cache
          key: ghostty-linux-${{ env.ZIG_VERSION }}-${{ steps.ghostty_rev.outputs.sha }}
          restore-keys: |
            ghostty-linux-${{ env.ZIG_VERSION }}-

      - name: Build generic libghostty
        run: |
          cd ghostty
          export ZIG_GLOBAL_CACHE_DIR="${GITHUB_WORKSPACE}/.zig-global-cache"
          zig build \
            -Dapp-runtime=none \
            -Doptimize=ReleaseFast \
            -Dtarget=x86_64-linux-gnu
          echo "Layout:"
          find . -type f | head -20

      - name: Pack ghostty tree
        run: tar czf ghostty-prebuilt.tar.gz ghostty

      - name: Upload ghostty tree
        uses: actions/upload-artifact@v6
        with:
          name: ghostty-prebuilt
          path: ghostty-prebuilt.tar.gz

  # ---------------------------------------------------------------------------
  # Ubuntu 24.04 LTS
  # ---------------------------------------------------------------------------
  build-linux-ubuntu-lts:
    if: github.event_name == 'push' || inputs.jobs == 'all' || contains(inputs.jobs, 'ubuntu') || contains(inputs.jobs, 'linux')
    needs: fetch-libghostty
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/patcito/prettymux-build-ubuntu:24.04
    steps:
      - name: Checkout prettymux
        uses: actions/checkout@v5

      - name: Download prebuilt ghostty
        uses: actions/download-artifact@v5
        with:
          name: ghostty-prebuilt
          path: .

      - name: Extract prebuilt ghostty
        run: tar xzf ghostty-prebuilt.tar.gz

      - name: Resolve ghostty directory
        run: |
          GHOSTTY_DIR="${GITHUB_WORKSPACE}/ghostty"
          if [ -d "${GHOSTTY_DIR}/ghostty/include" ]; then
            GHOSTTY_DIR="${GHOSTTY_DIR}/ghostty"
          fi
          test -d "${GHOSTTY_DIR}/include"
          test -f "${GHOSTTY_DIR}/vendor/glad/src/gl.c"
          echo "GHOSTTY_DIR=${GHOSTTY_DIR}" >> "$GITHUB_ENV"
          find "${GHOSTTY_DIR}" -type f | head -20

      - name: Build prettymux
        run: |
          cd src/gtk
          meson setup builddir \
            --prefix=/usr \
            -Dghostty_dir="${GHOSTTY_DIR}"
          ninja -C builddir

      - name: Package artifacts
        run: |
          rm -rf dist
          mkdir -p dist/usr/lib/prettymux
          mkdir -p dist/usr/share/prettymux/bin
          DESTDIR="$PWD/dist" meson install -C src/gtk/builddir --no-rebuild
          install -Dm644 ghostty/zig-out/lib/libghostty.so dist/usr/lib/prettymux/libghostty.so || true
          install -Dm644 src/gtk/prettymux-shell-integration.sh dist/usr/share/prettymux/shell-integration.sh || true
          install -Dm644 src/gtk/prettymux-bashrc.sh dist/usr/share/prettymux/prettymux-bashrc.sh || true
          install -Dm644 ghostty/src/shell-integration/bash/ghostty.bash dist/usr/share/prettymux/ghostty.bash || true
          install -Dm644 ghostty/src/shell-integration/bash/bash-preexec.sh dist/usr/share/prettymux/bash-preexec.sh || true
          mkdir -p dist/usr/share/prettymux/shell-integration
          cp -a ghostty/src/shell-integration/. dist/usr/share/prettymux/shell-integration/
          bash packaging/verify-shell-integration.sh dist/usr/share/prettymux
          install -Dm755 src/gtk/bin/open dist/usr/share/prettymux/bin/open || true
          install -Dm755 src/gtk/bin/xdg-open dist/usr/share/prettymux/bin/xdg-open || true
          install -Dm644 LICENSE dist/usr/share/licenses/prettymux/LICENSE || true
          tar czf prettymux-ubuntu-24.04-amd64.tar.gz -C dist .

      - name: Smoke test package
        run: |
          rm -rf smoke-root
          mkdir -p smoke-root
          tar xzf prettymux-ubuntu-24.04-amd64.tar.gz -C smoke-root
          bash packaging/ci-smoke-test.sh ubuntu \
            sh -lc 'LD_LIBRARY_PATH="$PWD/smoke-root/usr/lib/prettymux" "$PWD/smoke-root/usr/bin/prettymux"'

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: prettymux-ubuntu-24.04-amd64
          path: prettymux-ubuntu-24.04-amd64.tar.gz

  # ---------------------------------------------------------------------------
  # Fedora (RPM)
  # ---------------------------------------------------------------------------
  build-linux-fedora:
    if: github.event_name == 'push' || inputs.jobs == 'all' || contains(inputs.jobs, 'fedora') || contains(inputs.jobs, 'linux')
    needs: fetch-libghostty
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/patcito/prettymux-build-fedora:42
    steps:
      - name: Checkout prettymux
        uses: actions/checkout@v5

      - name: Download prebuilt ghostty
        uses: actions/download-artifact@v5
        with:
          name: ghostty-prebuilt
          path: .

      - name: Extract prebuilt ghostty
        run: tar xzf ghostty-prebuilt.tar.gz

      - name: Verify ghostty layout
        run: |
          echo "pwd: $(pwd)"
          echo "GITHUB_WORKSPACE: $GITHUB_WORKSPACE"
          ls -la ghostty/vendor/glad/src/ || echo "glad not found at relative path"
          ls -la $GITHUB_WORKSPACE/ghostty/vendor/glad/src/ || echo "glad not found at GITHUB_WORKSPACE path"
          find ghostty -type f | head -20

      - name: Build prettymux
        run: |
          echo "pwd: $(pwd)"
          ls -la ghostty/vendor/glad/src/gl.c || echo "gl.c not found"
          cd src/gtk
          meson setup builddir \
            --prefix=/usr \
            -Dghostty_dir=$(cd $GITHUB_WORKSPACE && pwd)/ghostty
          ninja -C builddir

      - name: Package artifacts
        run: |
          rm -rf dist
          mkdir -p dist/usr/lib/prettymux
          mkdir -p dist/usr/share/prettymux/bin
          DESTDIR="$PWD/dist" meson install -C src/gtk/builddir --no-rebuild
          install -Dm644 ghostty/zig-out/lib/libghostty.so dist/usr/lib/prettymux/libghostty.so || true
          install -Dm644 src/gtk/prettymux-shell-integration.sh dist/usr/share/prettymux/shell-integration.sh || true
          install -Dm644 src/gtk/prettymux-bashrc.sh dist/usr/share/prettymux/prettymux-bashrc.sh || true
          install -Dm644 ghostty/src/shell-integration/bash/ghostty.bash dist/usr/share/prettymux/ghostty.bash || true
          install -Dm644 ghostty/src/shell-integration/bash/bash-preexec.sh dist/usr/share/prettymux/bash-preexec.sh || true
          mkdir -p dist/usr/share/prettymux/shell-integration
          cp -a ghostty/src/shell-integration/. dist/usr/share/prettymux/shell-integration/
          bash packaging/verify-shell-integration.sh dist/usr/share/prettymux
          install -Dm755 src/gtk/bin/open dist/usr/share/prettymux/bin/open || true
          install -Dm755 src/gtk/bin/xdg-open dist/usr/share/prettymux/bin/xdg-open || true
          install -Dm644 LICENSE dist/usr/share/licenses/prettymux/LICENSE || true

      - name: Build RPM
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          if ! [[ "$VERSION" =~ ^[0-9] ]]; then VERSION="0.1.0"; fi
          export VERSION
          nfpm package -p rpm -f packaging/nfpm.yaml
          ls -lh *.rpm

      - name: Smoke test package
        run: |
          dnf install -y ./*.rpm
          bash packaging/ci-smoke-test.sh fedora prettymux

      - name: Upload RPM
        uses: actions/upload-artifact@v6
        with:
          name: prettymux-fedora-rpm
          path: '*.rpm'

  # ---------------------------------------------------------------------------
  # Debian package (.deb)
  # ---------------------------------------------------------------------------
  build-linux-deb:
    if: github.event_name == 'push' || inputs.jobs == 'all' || contains(inputs.jobs, 'deb') || contains(inputs.jobs, 'linux')
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/patcito/prettymux-build-debian:bookworm
    steps:
      - name: Checkout prettymux
        uses: actions/checkout@v5

      - name: Checkout ghostty fork
        uses: actions/checkout@v5
        with:
          repository: ${{ env.GHOSTTY_REPO }}
          ref: ${{ env.GHOSTTY_BRANCH }}
          path: ghostty

      - name: Resolve ghostty revision
        id: ghostty_rev
        run: |
          echo "sha=$(git -C ghostty rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Restore Ghostty Zig cache
        uses: actions/cache@v4
        with:
          path: |
            ghostty/.zig-cache
            .zig-global-cache
          key: ghostty-linux-${{ env.ZIG_VERSION }}-${{ steps.ghostty_rev.outputs.sha }}
          restore-keys: |
            ghostty-linux-${{ env.ZIG_VERSION }}-

      - name: Build ghostty
        run: |
          cd ghostty
          export ZIG_GLOBAL_CACHE_DIR="${GITHUB_WORKSPACE}/.zig-global-cache"
          zig build \
            -Dapp-runtime=none \
            -Doptimize=ReleaseFast \
            -Dtarget=x86_64-linux-gnu

      - name: Build prettymux
        run: |
          cd src/gtk
          meson setup builddir \
            --prefix=/usr \
            -Dghostty_dir="${GITHUB_WORKSPACE}/ghostty"
          ninja -C builddir

      - name: Package artifacts
        run: |
          rm -rf dist
          mkdir -p dist/usr/lib/prettymux
          mkdir -p dist/usr/share/prettymux/bin
          DESTDIR="$PWD/dist" meson install -C src/gtk/builddir --no-rebuild
          install -Dm644 ghostty/zig-out/lib/libghostty.so dist/usr/lib/prettymux/libghostty.so || true
          install -Dm644 src/gtk/prettymux-shell-integration.sh dist/usr/share/prettymux/shell-integration.sh || true
          install -Dm644 src/gtk/prettymux-bashrc.sh dist/usr/share/prettymux/prettymux-bashrc.sh || true
          install -Dm644 ghostty/src/shell-integration/bash/ghostty.bash dist/usr/share/prettymux/ghostty.bash || true
          install -Dm644 ghostty/src/shell-integration/bash/bash-preexec.sh dist/usr/share/prettymux/bash-preexec.sh || true
          mkdir -p dist/usr/share/prettymux/shell-integration
          cp -a ghostty/src/shell-integration/. dist/usr/share/prettymux/shell-integration/
          bash packaging/verify-shell-integration.sh dist/usr/share/prettymux
          install -Dm755 src/gtk/bin/open dist/usr/share/prettymux/bin/open || true
          install -Dm755 src/gtk/bin/xdg-open dist/usr/share/prettymux/bin/xdg-open || true
          install -Dm644 LICENSE dist/usr/share/licenses/prettymux/LICENSE || true

      - name: Build .deb
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          if ! [[ "$VERSION" =~ ^[0-9] ]]; then VERSION="0.1.0"; fi
          export VERSION
          nfpm package -p deb -f packaging/nfpm.yaml
          ls -lh *.deb

      - name: Smoke test package
        run: |
          apt-get update
          apt-get install -y ./*.deb
          bash packaging/ci-smoke-test.sh debian prettymux

      - name: Upload .deb
        uses: actions/upload-artifact@v6
        with:
          name: prettymux-deb
          path: '*.deb'

  # ---------------------------------------------------------------------------
  # Snap
  # ---------------------------------------------------------------------------
  build-snap:
    if: github.event_name == 'push' || inputs.jobs == 'all' || contains(inputs.jobs, 'snap') || contains(inputs.jobs, 'linux')
    runs-on: ubuntu-latest
    env:
      SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
    steps:
      - name: Checkout prettymux
        uses: actions/checkout@v5

      - name: Checkout ghostty fork
        uses: actions/checkout@v5
        with:
          repository: ${{ env.GHOSTTY_REPO }}
          ref: ${{ env.GHOSTTY_BRANCH }}
          path: ghostty

      - name: Build snap
        uses: snapcore/action-build@v1
        id: snapcraft
        # snapcraft.yaml handles full build inside the snap environment

      - name: Smoke test package
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools
          rm -rf snap-root
          unsquashfs -f -d snap-root "${{ steps.snapcraft.outputs.snap }}"
          bash packaging/ci-smoke-test.sh snap \
            sh -lc 'LD_LIBRARY_PATH="$PWD/snap-root/usr/lib/prettymux:${LD_LIBRARY_PATH:-}" "$PWD/snap-root/usr/bin/prettymux"'

      - name: Upload snap
        uses: actions/upload-artifact@v6
        with:
          name: prettymux-snap
          path: ${{ steps.snapcraft.outputs.snap }}

      - name: Publish to Snap Store
        if: (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch') && env.SNAPCRAFT_STORE_CREDENTIALS != ''
        continue-on-error: true
        uses: snapcore/action-publish@v1
        with:
          snap: ${{ steps.snapcraft.outputs.snap }}
          release: edge

  # ---------------------------------------------------------------------------
  # Flatpak
  # ---------------------------------------------------------------------------
  build-flatpak:
    if: github.event_name == 'push' || inputs.jobs == 'all' || contains(inputs.jobs, 'flatpak') || contains(inputs.jobs, 'linux')
    needs: fetch-libghostty
    runs-on: ubuntu-latest
    steps:
      - name: Checkout prettymux
        uses: actions/checkout@v5

      - name: Download prebuilt ghostty
        uses: actions/download-artifact@v5
        with:
          name: ghostty-prebuilt
          path: .

      - name: Extract prebuilt ghostty
        run: tar xzf ghostty-prebuilt.tar.gz

      - name: Install Flatpak Builder
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -qq
          sudo apt-get install -y flatpak flatpak-builder ca-certificates
          sudo flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.gnome.Platform//46 org.gnome.Sdk//46

      - name: Build Flatpak
        run: |
          rm -rf flatpak-build flatpak-repo prettymux.flatpak
          flatpak-builder --disable-rofiles-fuse --force-clean --repo=flatpak-repo flatpak-build packaging/dev.prettymux.app.yml
          flatpak build-bundle flatpak-repo prettymux.flatpak dev.prettymux.app master

      - name: Smoke test package
        run: |
          flatpak install -y --user ./prettymux.flatpak
          bash packaging/ci-smoke-test.sh flatpak flatpak run dev.prettymux.app

      - name: Upload Flatpak bundle
        uses: actions/upload-artifact@v6
        with:
          name: prettymux-flatpak
          path: prettymux.flatpak

  # ---------------------------------------------------------------------------
  # Arch Linux
  # ---------------------------------------------------------------------------
  build-archlinux:
    if: github.event_name == 'push' || inputs.jobs == 'all' || contains(inputs.jobs, 'arch') || contains(inputs.jobs, 'linux')
    needs: fetch-libghostty
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/patcito/prettymux-build-archlinux:latest
    steps:
      - name: Checkout prettymux
        uses: actions/checkout@v5

      - name: Download prebuilt ghostty
        uses: actions/download-artifact@v5
        with:
          name: ghostty-prebuilt
          path: .

      - name: Extract prebuilt ghostty
        run: tar xzf ghostty-prebuilt.tar.gz

      - name: Build prettymux
        run: |
          cd src/gtk
          meson setup builddir \
            --prefix=/usr \
            -Dghostty_dir=$GITHUB_WORKSPACE/ghostty
          ninja -C builddir

      - name: Create Arch package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          if ! [[ "$VERSION" =~ ^[0-9] ]]; then
            VERSION="$(sed -n 's/^pkgver=//p' packaging/PKGBUILD | head -n1)"
          fi
          [[ "$VERSION" =~ ^[0-9] ]] || VERSION="0.1.0"

          PKGDIR="prettymux-pkg"
          mkdir -p "$PKGDIR/usr/lib/prettymux"
          mkdir -p "$PKGDIR/usr/share/prettymux/bin"
          DESTDIR="$PWD/$PKGDIR" meson install -C src/gtk/builddir --no-rebuild
          install -Dm644 ghostty/zig-out/lib/libghostty.so "$PKGDIR/usr/lib/prettymux/libghostty.so" || true

          install -Dm644 src/gtk/prettymux-shell-integration.sh "$PKGDIR/usr/share/prettymux/shell-integration.sh" || true
          install -Dm644 src/gtk/prettymux-bashrc.sh "$PKGDIR/usr/share/prettymux/prettymux-bashrc.sh" || true
          install -Dm644 ghostty/src/shell-integration/bash/ghostty.bash "$PKGDIR/usr/share/prettymux/ghostty.bash" || true
          install -Dm644 ghostty/src/shell-integration/bash/bash-preexec.sh "$PKGDIR/usr/share/prettymux/bash-preexec.sh" || true
          mkdir -p "$PKGDIR/usr/share/prettymux/shell-integration"
          cp -a ghostty/src/shell-integration/. "$PKGDIR/usr/share/prettymux/shell-integration/"
          bash packaging/verify-shell-integration.sh "$PKGDIR/usr/share/prettymux"
          install -Dm755 src/gtk/bin/open "$PKGDIR/usr/share/prettymux/bin/open" || true
          install -Dm755 src/gtk/bin/xdg-open "$PKGDIR/usr/share/prettymux/bin/xdg-open" || true
          install -Dm644 LICENSE "$PKGDIR/usr/share/licenses/prettymux/LICENSE"

          printf '%s\n' \
            "pkgname = prettymux" \
            "pkgver = ${VERSION}-1" \
            "pkgdesc = GPU-accelerated terminal multiplexer" \
            "url = https://github.com/patcito/prettymux" \
            "builddate = $(date +%s)" \
            "packager = GitHub Actions <ci@prettymux.dev>" \
            "size = $(du -sb "$PKGDIR" | cut -f1)" \
            "arch = x86_64" \
            "license = GPL-3.0-only" \
            "depend = gtk4" \
            "depend = libadwaita" \
            "depend = webkitgtk-6.0" \
            "depend = json-glib" \
            > "$PKGDIR/.PKGINFO"

          cd "$PKGDIR"
          tar --zstd -cf ../prettymux-${VERSION}-1-x86_64.pkg.tar.zst .PKGINFO usr/

      - name: Smoke test package
        run: |
          pacman -U --noconfirm ./*.pkg.tar.zst
          bash packaging/ci-smoke-test.sh arch prettymux

      - name: Upload package
        uses: actions/upload-artifact@v6
        with:
          name: prettymux-archlinux
          path: '*.pkg.tar.zst'

      - name: Upload PKGBUILD
        uses: actions/upload-artifact@v6
        with:
          name: prettymux-pkgbuild
          path: packaging/PKGBUILD

      - name: Publish to AUR
        if: (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch') && env.AUR_SSH_PRIVATE_KEY != ''
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          pacman -Sy --noconfirm --needed openssh shadow
          id -u aurbuilder >/dev/null 2>&1 || useradd -m -U aurbuilder
          install -d -m 700 -o aurbuilder -g aurbuilder /home/aurbuilder/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > /home/aurbuilder/.ssh/aur
          chmod 600 /home/aurbuilder/.ssh/aur
          ssh-keyscan -H -t rsa,ecdsa,ed25519 aur.archlinux.org > /home/aurbuilder/.ssh/known_hosts
          chmod 600 /home/aurbuilder/.ssh/known_hosts
          cat > /home/aurbuilder/.ssh/config <<'EOF'
          Host aur.archlinux.org
            HostName aur.archlinux.org
            User aur
            IdentityFile /home/aurbuilder/.ssh/aur
            IdentitiesOnly yes
            StrictHostKeyChecking yes
            UserKnownHostsFile /home/aurbuilder/.ssh/known_hosts
          EOF
          chmod 600 /home/aurbuilder/.ssh/config
          chown -R aurbuilder:aurbuilder /home/aurbuilder/.ssh

          su - aurbuilder -c 'git config --global user.name "prettymux-bot"'
          su - aurbuilder -c 'git config --global user.email "prettymux-bot@users.noreply.github.com"'

          rm -rf /tmp/aur-prettymux
          su - aurbuilder -c 'git clone ssh://aur@aur.archlinux.org/prettymux.git /tmp/aur-prettymux'

          cp packaging/PKGBUILD /tmp/aur-prettymux/PKGBUILD
          chown -R aurbuilder:aurbuilder /tmp/aur-prettymux
          su - aurbuilder -c '
            cd /tmp/aur-prettymux &&
            makepkg --printsrcinfo > .SRCINFO &&
            git add PKGBUILD .SRCINFO &&
            if git diff --cached --quiet; then
              echo "No AUR changes to publish"
              exit 0
            fi &&
            git commit -m "Update PKGBUILD and .SRCINFO" &&
            git push origin master
          '

  # ---------------------------------------------------------------------------
  # Publish to PPA (Ubuntu)
  # ---------------------------------------------------------------------------
  publish-ppa:
    if: false
    runs-on: ubuntu-latest
    env:
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
    steps:
      - name: Checkout prettymux
        uses: actions/checkout@v5

      - name: Download prebuilt ghostty
        run: |
          mkdir -p ghostty/zig-out ghostty/vendor
          gh release download ${{ env.GHOSTTY_RELEASE }} \
            --repo ${{ env.GHOSTTY_REPO }} \
            --pattern 'ghostty-linux-x86_64.tar.gz' \
            --pattern 'ghostty-glad.tar.gz'
          tar xzf ghostty-linux-x86_64.tar.gz -C ghostty/
          mv ghostty/lib ghostty/zig-out/lib
          tar xzf ghostty-glad.tar.gz -C ghostty/vendor/
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create source tarball
        run: |
          BASE_VERSION=""
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            BASE_VERSION=${GITHUB_REF_NAME#v}
          fi
          if [ -z "$BASE_VERSION" ]; then
            BASE_VERSION=$(dpkg-parsechangelog -l packaging/debian/changelog --show-field Version 2>/dev/null | cut -d- -f1)
          fi
          if [ -z "$BASE_VERSION" ]; then
            BASE_VERSION=$(sed -n "s/^[[:space:]]*version: '\\([^']*\\)'.*/\\1/p" src/gtk/meson.build | head -1)
          fi
          if [ -z "$BASE_VERSION" ]; then
            BASE_VERSION="0.2.0"
          fi

          VERSION="$BASE_VERSION"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            SNAPSHOT_SUFFIX="+git$(date -u +%Y%m%d%H%M).$(git rev-parse --short HEAD)"
            VERSION="${BASE_VERSION}${SNAPSHOT_SUFFIX}"
          fi
          PPA_REVISION=$((GITHUB_RUN_NUMBER * 10 + GITHUB_RUN_ATTEMPT - 1))
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "PPA_REVISION=$PPA_REVISION" >> $GITHUB_ENV
          # Verify ghostty lib exists before tarball
          ls -la ghostty/zig-out/lib/
          tar czf prettymux_${VERSION}.orig.tar.gz \
            --transform "s,^,prettymux-${VERSION}/," \
            --exclude='.git' --exclude='builddir' --exclude='node_modules' \
            src/ packaging/ ghostty/ LICENSE

      - name: Publish to PPA
        if: env.GPG_PRIVATE_KEY != ''
        uses: yuezk/publish-ppa-package@main
        with:
          repository: patcito/prettymux
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg_passphrase: ${{ secrets.GPG_PASSPHRASE }}
          tarball: prettymux_${{ env.VERSION }}.orig.tar.gz
          debian_dir: packaging/debian
          deb_email: patcito@gmail.com
          deb_fullname: Patrick Aljord
          series: noble
          revision: ${{ env.PPA_REVISION }}
          keep_changelog: true
  # ---------------------------------------------------------------------------
  # AppImage
  # ---------------------------------------------------------------------------
  build-appimage:
    if: github.event_name == 'push' || inputs.jobs == 'all' || contains(inputs.jobs, 'appimage') || contains(inputs.jobs, 'linux')
    needs: fetch-libghostty
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout prettymux
        uses: actions/checkout@v5

      - name: Download prebuilt ghostty
        uses: actions/download-artifact@v5
        with:
          name: ghostty-prebuilt
          path: .

      - name: Extract prebuilt ghostty
        run: tar xzf ghostty-prebuilt.tar.gz

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libwebkitgtk-6.0-dev libjson-glib-dev meson ninja-build

      - name: Build prettymux
        run: |
          cd src/gtk
          meson setup builddir \
            -Dghostty_dir=${{ github.workspace }}/ghostty
          ninja -C builddir

      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/lib/prettymux
          mkdir -p AppDir/usr/share/prettymux/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/scalable/apps
          cp src/gtk/builddir/prettymux AppDir/usr/bin/
          cp src/gtk/builddir/prettymux-open AppDir/usr/bin/ || true
          cp ghostty/zig-out/lib/libghostty.so AppDir/usr/lib/prettymux/ || true
          cp src/gtk/prettymux-shell-integration.sh AppDir/usr/share/prettymux/shell-integration.sh || true
          cp src/gtk/prettymux-bashrc.sh AppDir/usr/share/prettymux/prettymux-bashrc.sh || true
          cp ghostty/src/shell-integration/bash/ghostty.bash AppDir/usr/share/prettymux/ghostty.bash || true
          cp ghostty/src/shell-integration/bash/bash-preexec.sh AppDir/usr/share/prettymux/bash-preexec.sh || true
          mkdir -p AppDir/usr/share/prettymux/shell-integration
          cp -a ghostty/src/shell-integration/. AppDir/usr/share/prettymux/shell-integration/
          bash packaging/verify-shell-integration.sh AppDir/usr/share/prettymux
          cp src/gtk/bin/open AppDir/usr/share/prettymux/bin/open || true
          cp src/gtk/bin/xdg-open AppDir/usr/share/prettymux/bin/xdg-open || true
          cp packaging/prettymux.desktop AppDir/usr/share/applications/prettymux.desktop
          cp packaging/prettymux.svg AppDir/usr/share/icons/hicolor/scalable/apps/prettymux.svg

      - name: Build AppImage
        uses: AppImageCrafters/build-appimage@v1
        with:
          recipe: packaging/AppImageBuilder.yml
        env:
          UPDATE_INFO: gh-releases-zsync|patcito|prettymux|latest|PrettyMux-*x86_64.AppImage.zsync

      - name: Smoke test package
        run: |
          test -x ./*.AppImage || true
          APPIMAGE_EXTRACT_AND_RUN=1 \
            bash packaging/ci-smoke-test.sh appimage ./*.AppImage

      - name: Upload AppImage
        uses: actions/upload-artifact@v6
        with:
          name: prettymux-appimage
          path: '*.AppImage'

